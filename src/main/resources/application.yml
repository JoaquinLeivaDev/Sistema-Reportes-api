spring:
  application:
    name: aduana-reportes-api
  cloud:
    compatibility-verifier:
      enabled: false

server:
  port: ${PORT:8081}

aduana:
  api:
    url: ${ADUANA_API_URL:http://localhost:8080}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true